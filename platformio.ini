[platformio]
src_dir = firmware/src
include_dir = firmware/include
libdeps_dir = firmware/.pio/libdeps
build_dir = firmware/.pio/build
data_dir = data

[env:waveshare_amoled]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_build.psram = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

lib_deps =
    lvgl/lvgl@^8.3.0
    Wire
    bblanchon/ArduinoJson@^7.0.0
    claws/BH1750@^1.3.0
    moononournation/GFX Library for Arduino@^1.6.4
    adafruit/Adafruit BusIO
    adafruit/Adafruit XCA9554

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLV_CONF_INCLUDE_SIMPLE
    -I firmware/include
    -I firmware/.pio/libdeps/waveshare_amoled/lvgl
